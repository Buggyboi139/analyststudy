<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Study Arena</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Security Study Arena</h1>
        <button id="theme-toggle">Toggle Dark Mode</button>
    </header>

    <main id="app-container">
        <section id="config-section">
            <h2>Configuration</h2>
            <div class="input-group">
                <label for="exam-select">Select Exam:</label>
                <select id="exam-select">
                    <option value="cysa">CySA+</option>
                    <option value="secplus">Security+</option>
                    <option value="casp">CASP+</option>
                </select>
            </div>
            <div class="input-group">
                <label for="api-key">OpenRouter API Key (BYOK):</label>
                <input type="password" id="api-key" placeholder="sk-or-v1-...">
                <button id="save-key-btn">Save Key</button>
            </div>
            <button id="start-btn" class="primary-btn">Start Study Mode</button>
        </section>

        <section id="quiz-section" class="hidden">
            <div id="progress-bar">Question <span id="current-q-num">1</span> of <span id="total-q-num"></span></div>
            <h2 id="question-text"></h2>
            <div id="options-container"></div>
            <div class="controls">
                <button id="prev-btn" disabled>Previous</button>
                <button id="next-btn">Next</button>
            </div>
        </section>

        <div id="feedback-card" class="hidden">
            <h3 id="feedback-verdict"></h3>
            <p id="feedback-definition"></p>
            <button id="ai-tutor-btn">Explain with AI Tutor</button>
            <div id="ai-response-container" class="hidden">
                <p id="ai-response-text"></p>
            </div>
        </div>
    </main>

    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
